# SonarCloud automatic analysis configuration.
#
# HelpPage.tsx, examples.ts and functionCatalog.ts are declarative content:
# many long worked-example listings / catalog entries as template literals and
# object literals. The copy-paste detector anonymizes string literals, so
# distinct, structurally-similar entries register as huge false-positive
# duplicate blocks. Exclude these data files from duplication detection only
# (all other rules still apply to them).
sonar.cpd.exclusions=frontend/src/HelpPage.tsx,frontend/src/examples.ts,frontend/src/functionCatalog.ts
