plugins {
    id 'java'
    id 'antlr'
    id 'jacoco'
    id 'org.springframework.boot' version '3.5.6'
    id 'org.sonarqube' version '7.3.1.8318'
}

group = 'com.frees'
version = '0.0.1'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

repositories {
    mavenCentral()
}

// Lock dependency versions (gradle.lockfile) so builds are reproducible.
dependencyLocking {
    lockAllConfigurations()
}

dependencies {
    antlr 'org.antlr:antlr4:4.13.2'

    implementation platform('org.springframework.boot:spring-boot-dependencies:3.5.6')
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.antlr:antlr4-runtime:4.13.2'
    implementation 'org.jgrapht:jgrapht-core:1.5.2'
    implementation 'org.apache.commons:commons-math3:3.6.1'
    implementation 'net.java.dev.jna:jna:5.14.0'
    implementation 'org.apache.xmlgraphics:fop-transcoder:2.11'
    // Symja (matheclipse): pure-Java computer algebra system powering the CAS
    // directives (factor/expand/simplify; later solve/integrate).
    implementation 'org.matheclipse:matheclipse-core:3.0.0'

    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

generateGrammarSource {
    arguments += ['-visitor', '-no-listener', '-package', 'com.frees.backend.parser']
    outputDirectory = file('build/generated-src/antlr/main/com/frees/backend/parser')
}

tasks.named('test') {
    useJUnitPlatform()
    // CoolProp shared library for fluid property tests (skipped if absent).
    environment 'COOLPROP_LIBRARY', "${projectDir}/native/libCoolProp.so"
}

tasks.named('bootRun') {
    environment 'COOLPROP_LIBRARY', "${projectDir}/native/libCoolProp.so"
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
    }
}

// CI-based SonarCloud scan covering the whole repository in one project:
// Java is analyzed with bytecode here (automatic analysis cannot do that),
// and the frontend, Dockerfiles and CI workflows are swept into the same scan.
sonar {
    properties {
        property 'sonar.projectKey', 'ernsoylu_frEES'
        property 'sonar.organization', 'ernsoylu'
        property 'sonar.host.url', 'https://sonarcloud.io'
        property 'sonar.projectBaseDir', "${projectDir}/.."
        property 'sonar.sources', 'backend/src/main/java,frontend/src,backend/Dockerfile,frontend/Dockerfile,docker-compose.yml,.github/workflows'
        property 'sonar.tests', 'backend/src/test/java'
        property 'sonar.exclusions', '**/node_modules/**,**/build/**,**/dist/**'
        // HelpPage.tsx, examples.ts and functionCatalog.ts are declarative
        // content: the duplication detector anonymizes string literals, so their
        // distinct example listings / catalog entries register as false-positive
        // duplicate blocks.
        property 'sonar.cpd.exclusions', 'frontend/src/HelpPage.tsx,frontend/src/examples.ts,frontend/src/functionCatalog.ts'
        property 'sonar.coverage.jacoco.xmlReportPaths',
                "${layout.buildDirectory.get()}/reports/jacoco/test/jacocoTestReport.xml"
        property 'sonar.coverage.exclusions', 'frontend/**/*,frontend/src/**/*,**/frontend/**/*,backend/Dockerfile,frontend/Dockerfile,docker-compose.yml,.github/workflows/**/*'
    }
}
