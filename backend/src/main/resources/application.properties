server.port=${PORT:8080}
spring.application.name=frees-backend

# Topology health probe (GET /api/health). The frontend tier can only be
# reached by URL, so supply its internal address per deployment (on Railway:
# http://frees-frontend.railway.internal:8080/). Left blank, the frontend
# component is reported UNKNOWN rather than probed.
frees.health.frontend-url=${FRONTEND_HEALTH_URL:}

# DoS guards on /api (see RequestGuardFilter). Override per deployment.
frees.security.max-body-bytes=1048576
frees.security.rate-limit-requests=120
frees.security.rate-limit-window-seconds=60

# Redis configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# RabbitMQ configuration (asynchronous compute architecture).
# The API node publishes ComputeTasks; the compute node consumes them with
# prefetch = 1 for fair dispatch across replicas.
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}
spring.rabbitmq.listener.simple.prefetch=1
spring.rabbitmq.listener.simple.default-requeue-rejected=false

# OpenTelemetry (Spring Boot native starter, Boot 4+). Spans are created
# in-process and joined across the API->RabbitMQ->compute hops by the manual
# W3C propagation in TraceContextInjector/ComputeTaskListener.
#
# OTLP export is OFF by default to match the prior deployment posture (no
# collector in front of the app):
#   - Tracing: the OTLP span exporter is only auto-configured when an endpoint
#     is set, so it stays dormant until one is supplied.
#   - Metrics: the OTLP meter registry otherwise defaults to localhost:4318 and
#     logs periodic "failed to publish" warnings, so it is disabled here.
# To ship telemetry, set OTLP_METRICS_ENABLED=true and an OTLP endpoint via
# OTLP_TRACES_ENDPOINT / OTEL_EXPORTER_OTLP_ENDPOINT per deployment.
management.tracing.sampling.probability=${TRACING_SAMPLE_PROB:1.0}
management.otlp.metrics.export.enabled=${OTLP_METRICS_ENABLED:false}

