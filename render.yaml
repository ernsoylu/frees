# Render Blueprint — frEES Asynchronous Compute Architecture
#
# Deploys the full distributed stack: managed Redis, RabbitMQ (private service),
# an API node (web service, `api` profile), 3 compute nodes (background workers,
# `compute` profile), and the frontend (web service, async-polling client).
#
# Apply with: `render blueprint apply` (or connect the repo in the Render
# dashboard — Render auto-detects this file).
#
# Plan requirements: at least a Starter plan for the worker and private service
# (Render's free tier doesn't support workers/pservs). Redis has a free tier.
# The otel-collector + jaeger observability stack is omitted here to save
# resources; see observability/README.md to add it if needed.

services:
  # ── Managed Redis (job state + REPL session store) ───────────────────────
  - type: redis
    name: frees-redis
    plan: starter
    ipAllowList: [] # internal only — no external access
    maxmemoryPolicy: noeviction

  # ── RabbitMQ (private service — message broker for compute tasks) ────────
  - type: pserv
    name: frees-rabbitmq
    env: docker
    image:
      url: rabbitmq:3-management-alpine
    # RabbitMQ needs the management port for the dashboard and 5672 for AMQP.
    # Render private services expose the first EXPOSE port (5672).
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 1
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: guest
      - key: RABBITMQ_DEFAULT_PASS
        value: guest

  # ── API node (producer — accepts solve/optimize requests, enqueues tasks) ─
  - type: web
    name: frees-api
    env: docker
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/fluids
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: api
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          type: redis
          name: frees-redis
          property: host
      - key: SPRING_RABBITMQ_HOST
        fromService:
          type: pserv
          name: frees-rabbitmq
          property: host
      - key: FREES_CORS_ALLOWED_ORIGINS
        value: "https://frees-frontend.onrender.com,http://localhost:5173"
      # OpenTelemetry (optional — set OTEL_EXPORTER_OTLP_ENDPOINT to a collector
      # to enable tracing; omitted by default to avoid connection-refused noise).
      - key: OTEL_TRACES_EXPORTER
        value: none
      - key: OTEL_METRICS_EXPORTER
        value: none
      - key: OTEL_LOGS_EXPORTER
        value: none

  # ── Compute node (consumer — solves enqueued tasks, writes results to Redis)
  #    Scale replicas in the Render dashboard (numInstances below sets the
  #    initial count; fair dispatch via prefetch=1 distributes work evenly).
  - type: worker
    name: frees-compute
    env: docker
    dockerContext: backend
    dockerfilePath: ./Dockerfile
    numInstances: 3
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: compute
      - key: SPRING_MAIN_WEB_APPLICATION_TYPE
        value: none
      - key: SPRING_DATA_REDIS_HOST
        fromService:
          type: redis
          name: frees-redis
          property: host
      - key: SPRING_RABBITMQ_HOST
        fromService:
          type: pserv
          name: frees-rabbitmq
          property: host
      - key: OTEL_TRACES_EXPORTER
        value: none
      - key: OTEL_METRICS_EXPORTER
        value: none
      - key: OTEL_LOGS_EXPORTER
        value: none

  # ── Frontend (static SPA + nginx reverse proxy) ──────────────────────────
  - type: web
    name: frees-frontend
    env: docker
    dockerContext: frontend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      # The nginx template expands ${BACKEND_HOST} at startup so the proxy
      # targets the API node's internal Render hostname.
      - key: BACKEND_HOST
        fromService:
          type: web
          name: frees-api
          property: host
      - key: BUILD_COMMIT
        value: ""
    # Build args are passed to the Docker build. VITE_ASYNC_API=1 bakes the
    # async submit→poll client into the bundle so it matches the api profile.
    buildArgs:
      - key: VITE_ASYNC_API
        value: "1"
