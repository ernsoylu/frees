services:
  backend:
    build: ./backend
    container_name: frees-backend
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: frees-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
