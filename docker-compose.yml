services:
  backend:
    build: ./backend
    container_name: frees-backend
    # Bind the API to the loopback interface only: local dev can still reach
    # http://localhost:8080/api, but remote/LAN hosts cannot hit the backend
    # directly — they must go through the rate-limited nginx proxy (which also
    # sees the real client IP). The frontend container reaches it over the
    # compose network as backend:8080 regardless of this published binding.
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8080' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      args:
        # Set by frees.sh from `git rev-parse --short HEAD`; empty for ad-hoc builds.
        VITE_COMMIT_HASH: ${VITE_COMMIT_HASH:-}
    # Runtime stamp: the entrypoint writes this into build-info.js. On Render the
    # built-in RENDER_GIT_COMMIT takes precedence; locally frees.sh supplies it.
    environment:
      BUILD_COMMIT: ${VITE_COMMIT_HASH:-}
    container_name: frees-frontend
    ports:
      - "5173:8080"
    depends_on:
      backend:
        condition: service_healthy
