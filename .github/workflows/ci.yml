name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      - name: Run tests, generate coverage report, and enforce coverage floor
        working-directory: backend
        run: ./gradlew test jacocoTestReport jacocoTestCoverageVerification

      - name: Cache SonarCloud packages
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        working-directory: backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew sonar

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: backend-test-report
          path: backend/build/reports/tests/test/

  frontend-build:
    name: Frontend type-check and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Audit dependencies (fail on high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high --omit=dev

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  dependency-scan:
    name: Dependency scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Trivy scans the repo filesystem for known CVEs in locked dependencies:
      # backend/gradle.lockfile (Java) and frontend/package-lock.json (npm). It
      # uses its own vulnerability DB (GitHub Advisories, OSV, distro feeds) and
      # needs NO API key. Fails the build on any HIGH/CRITICAL with a fix.
      #
      # Run the official Trivy image directly (from AWS public ECR — no auth)
      # rather than the trivy-action, whose install.sh downloads the binary from
      # GitHub Releases and is prone to flaky/rate-limited failures.
      #
      # Anonymous ECR Public pulls are themselves rate-limited and intermittently
      # return `toomanyrequests` — surfacing as Docker exit code 125 (the run
      # never starts), distinct from Trivy's own codes (0 = clean, 1 = a real
      # HIGH/CRITICAL finding). So we retry only on 125 with backoff and pass
      # every other exit code straight through — a transient registry hiccup must
      # never mask, nor be mistaken for, an actual vulnerability.
      - name: Run Trivy filesystem scan (fail on HIGH/CRITICAL)
        run: |
          set +e
          for attempt in 1 2 3 4; do
            docker run --rm -v "${{ github.workspace }}:/repo:ro" \
              public.ecr.aws/aquasecurity/trivy:0.64.1 \
              fs /repo \
              --scanners vuln \
              --severity HIGH,CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              --no-progress
            code=$?
            if [ "$code" -ne 125 ]; then
              exit "$code"
            fi
            echo "::warning::Trivy image pull failed (docker exit 125, attempt ${attempt}/4); retrying after backoff"
            sleep $((attempt * 20))
          done
          echo "::error::Trivy image pull kept failing (exit 125) after 4 attempts — ECR Public rate limit"
          exit 1

  docker-publish:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, dependency-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and push backend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frees-backend:latest
            ghcr.io/${{ github.repository_owner }}/frees-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: frontend
          push: true
          build-args: |
            VITE_ASYNC_API=1
            VITE_COMMIT_HASH=${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/frees-frontend:latest
            ghcr.io/${{ github.repository_owner }}/frees-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
