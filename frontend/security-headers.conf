# Security response headers, included into every location block of the server
# (see nginx.conf.template). Kept in one file because nginx does NOT inherit
# `add_header` into a location that defines any add_header of its own — so the
# headers must be re-stated per block, and a single include avoids drift.
#
# `always` sends the header even on error/non-2xx responses.

# Force HTTPS for ~180 days (incl. subdomains). Bump to 31536000 and add
# `preload` once you're confident every subdomain is HTTPS-only.
add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

# Block MIME-type sniffing.
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking protection (legacy header; CSP frame-ancestors is the modern one).
add_header X-Frame-Options "SAMEORIGIN" always;

# Don't leak full URLs (which may contain query state) to cross-origin targets.
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Drop access to powerful APIs the app doesn't use.
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;

# Content-Security-Policy — Enforced to mitigate Cross-Site Scripting (XSS) and
# unauthorized resource loading.
#   - style-src 'unsafe-inline' is required: Mantine (emotion) and KaTeX inject
#     <style> elements and inline style="" attributes.
#   - img-src/font-src data:/blob: cover Plotly image export and KaTeX/Excalidraw assets.
#   - worker-src blob: covers Excalidraw's web workers.
#   - connect-src 'self': the app only calls the same-origin /api proxy.
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; img-src 'self' data: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; worker-src 'self' blob:; connect-src 'self'" always;
